<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ MAGIC ORB - ЭВОЛЮЦИЯ СФЕРЫ ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: radial-gradient(circle at 50% 50%, #1a1a3a, #0a0a1a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }
        
        .game-container {
            width: 100%;
            max-width: 450px;
            background: rgba(10, 10, 25, 0.8);
            border-radius: 36px;
            padding: 16px 12px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 0 2px rgba(255,215,0,0.2) inset;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            transform: translateZ(0);
        }
        
        /* Компактная верхняя панель */
        .top-panel {
            background: rgba(0,0,0,0.4);
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }
        
        .badge {
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            justify-content: center;
        }
        
        .badge.level { background: linear-gradient(135deg, #ff4757, #ff6b81); color: white; }
        .badge.gold { background: linear-gradient(135deg, #ffa502, #ffd700); color: #000; }
        .badge.gems { background: linear-gradient(135deg, #a55eea, #8e44ad); color: white; }
        
        /* Компактные полосы прогресса */
        .progress-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .progress-container {
            flex: 1;
            height: 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255,215,0,0.2);
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            transition: width 0.2s linear;
            border-radius: 12px;
        }
        
        .progress-bar.exp { background: linear-gradient(90deg, #26de81, #20bf6b); }
        .progress-bar.energy { background: linear-gradient(90deg, #4b7bec, #3867d6); }
        
        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 9px;
            font-weight: bold;
            text-shadow: 0 1px 2px black;
            white-space: nowrap;
        }
        
        .progress-label {
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            min-width: 45px;
        }
        
        /* Счет */
        .score-container {
            text-align: center;
            margin: 8px 0;
        }
        
        .score-label {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            letter-spacing: 2px;
        }
        
        .score-value {
            color: #ffd700;
            font-size: 56px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            line-height: 1.1;
        }
        
        /* Сфера с эволюцией */
        .orb-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 15px 0;
            cursor: pointer;
            position: relative;
            min-height: 240px;
        }
        
        .orb {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            transform: translateZ(0);
            animation: float 3s ease-in-out infinite;
        }
        
        /* Эволюция сферы - 10 уровней */
        .orb.evo-1 { background: radial-gradient(circle at 30% 30%, #4facfe, #0a2f6a); box-shadow: 0 0 40px #4facfe; }
        .orb.evo-2 { background: radial-gradient(circle at 30% 30%, #6a5acd, #483d8b); box-shadow: 0 0 50px #6a5acd; }
        .orb.evo-3 { background: radial-gradient(circle at 30% 30%, #ff69b4, #c71585); box-shadow: 0 0 60px #ff69b4; }
        .orb.evo-4 { background: radial-gradient(circle at 30% 30%, #ffa07a, #cd5c5c); box-shadow: 0 0 70px #ffa07a; }
        .orb.evo-5 { background: radial-gradient(circle at 30% 30%, #7b68ee, #4b0082); box-shadow: 0 0 80px #7b68ee; }
        .orb.evo-6 { background: radial-gradient(circle at 30% 30%, #00fa9a, #2e8b57); box-shadow: 0 0 90px #00fa9a; }
        .orb.evo-7 { background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b); box-shadow: 0 0 100px gold; }
        .orb.evo-8 { background: radial-gradient(circle at 30% 30%, #ff4500, #8b0000); box-shadow: 0 0 110px #ff4500; }
        .orb.evo-9 { background: radial-gradient(circle at 30% 30%, #9370db, #663399); box-shadow: 0 0 120px #9370db; }
        .orb.evo-10 { 
            background: radial-gradient(circle at 30% 30%, #ffffff, #f0e68c, #ffd700);
            box-shadow: 0 0 150px gold, 0 0 0 4px rgba(255,255,255,0.8) inset;
            animation: legendaryFloat 2s ease-in-out infinite;
        }
        
        /* Трещины для каждой стадии */
        .orb::before, .orb::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.4);
            border-radius: 2px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .orb.cracked-1::before {
            opacity: 0.3;
            top: 30%;
            left: 40%;
            width: 15%;
            height: 2px;
            transform: rotate(45deg);
            box-shadow: 0 0 8px white;
        }
        
        .orb.cracked-2::before {
            opacity: 0.4;
            top: 25%;
            left: 35%;
            width: 20%;
            height: 2px;
            transform: rotate(30deg);
            box-shadow: 0 0 10px white;
        }
        
        .orb.cracked-2::after {
            opacity: 0.4;
            top: 45%;
            left: 30%;
            width: 18%;
            height: 2px;
            transform: rotate(-15deg);
            box-shadow: 0 0 10px white;
        }
        
        .orb.cracked-3::before,
        .orb.cracked-3::after {
            opacity: 0.6;
            box-shadow: 0 0 15px white;
        }
        
        .orb.cracked-3::before {
            top: 20%;
            left: 30%;
            width: 25%;
            height: 3px;
            transform: rotate(45deg);
        }
        
        .orb.cracked-3::after {
            top: 35%;
            left: 25%;
            width: 22%;
            height: 3px;
            transform: rotate(-20deg);
        }
        
        .orb.cracked-4::before,
        .orb.cracked-4::after {
            opacity: 0.8;
            box-shadow: 0 0 20px white;
        }
        
        .orb.cracked-4::before {
            top: 15%;
            left: 20%;
            width: 30%;
            height: 4px;
            transform: rotate(60deg);
        }
        
        .orb.cracked-4::after {
            top: 40%;
            left: 35%;
            width: 28%;
            height: 4px;
            transform: rotate(-30deg);
        }
        
        .orb.cracked-5::before,
        .orb.cracked-5::after {
            opacity: 1;
            box-shadow: 0 0 25px white;
        }
        
        .orb.cracked-5::before {
            top: 10%;
            left: 15%;
            width: 35%;
            height: 5px;
            transform: rotate(75deg);
        }
        
        .orb.cracked-5::after {
            top: 30%;
            left: 40%;
            width: 32%;
            height: 5px;
            transform: rotate(-45deg);
        }
        
        /* Анимации разрушения */
        .orb.shatter {
            animation: shatter 0.5s ease-out forwards;
        }
        
        @keyframes shatter {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; filter: brightness(2); }
            100% { transform: scale(0); opacity: 0; }
        }
        
        .orb.evolve {
            animation: evolve 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        
        @keyframes evolve {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.3) rotate(180deg); filter: brightness(2); }
            100% { transform: scale(1) rotate(360deg); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes legendaryFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }
        
        /* Компактная статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
            margin: 10px 0;
        }
        
        .stat-item {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 6px 2px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.1);
        }
        
        .stat-icon { font-size: 14px; margin-bottom: 2px; }
        .stat-label { color: rgba(255,255,255,0.4); font-size: 8px; text-transform: uppercase; }
        .stat-value { color: white; font-size: 11px; font-weight: bold; }
        
        /* Вкладки */
        .tabs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            margin: 10px 0;
        }
        
        .tab {
            background: rgba(0,0,0,0.5);
            color: rgba(255,255,255,0.6);
            border: none;
            padding: 8px 2px;
            border-radius: 10px 10px 0 0;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        
        .tab.active {
            background: rgba(255,215,0,0.15);
            color: gold;
            border-bottom: 2px solid gold;
        }
        
        /* Панели */
        .panel {
            background: rgba(0,0,0,0.8);
            border-radius: 0 0 16px 16px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid gold;
            border-top: none;
            display: none;
            max-height: 250px;
            overflow-y: auto;
        }
        
        .panel.visible { display: block; }
        .panel-title { color: gold; font-size: 16px; text-align: center; margin-bottom: 10px; }
        
        /* Предметы */
        .shop-item {
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 10px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,215,0,0.2);
            cursor: pointer;
        }
        
        .shop-item:active { background: rgba(255,215,0,0.1); transform: scale(0.99); }
        .shop-item.premium { border-color: #ff00ff; box-shadow: 0 0 10px #ff00ff33; }
        
        .shop-item-info { display: flex; align-items: center; gap: 8px; }
        .shop-item-icon { font-size: 24px; }
        .shop-item-name { color: white; font-weight: bold; font-size: 13px; }
        .shop-item-desc { color: rgba(255,255,255,0.4); font-size: 10px; }
        .shop-item-price {
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 11px;
        }
        .shop-item-price.gems { background: linear-gradient(135deg, #a55eea, #8e44ad); color: white; }
        
        /* Кнопки */
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 10px;
        }
        
        .action-btn {
            background: linear-gradient(135deg, #4b7bec, #3867d6);
            border: none;
            color: white;
            padding: 8px 2px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .action-btn:active { transform: scale(0.96); }
        .action-btn.premium { background: linear-gradient(135deg, #a55eea, #8e44ad); }
        .action-btn.event { background: linear-gradient(135deg, #ff4757, #ff6b81); }
        
        /* Уведомление */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #26de81, #20bf6b);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            border: 2px solid gold;
        }
        
        /* Прогресс эволюции */
        .evolution-progress {
            text-align: center;
            margin: 5px 0;
            font-size: 12px;
            color: #ffd700;
        }
        
        .evolution-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 2px;
        }
        
        .evolution-fill {
            height: 100%;
button class="action-btn" onclick="game.save()">💾 СОХРАНИТЬ</button>
            <button class="action-btn event" onclick="game.triggerRandomEvent()">🎲 СОБЫТИЕ</button>
            <button class="action-btn premium" onclick="game.premiumSpin()">✨ СПИН</button>
        </div>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script>
        class  {
            constructor() {
                // Ресурсы
                this.score = 0;
                this.gold = 0;
                this.gems = 0;
                this.level = 1;
                this.exp = 0;
                this.expRequired = 200;
                this.energy = 10
